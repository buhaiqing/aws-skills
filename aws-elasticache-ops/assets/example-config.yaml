## Connection Examples

### Redis Connection (Python)

```python
import redis

# Basic connection
r = redis.Redis(
    host='prod-redis-cluster.xxx.cache.amazonaws.com',
    port=6379,
    decode_responses=True
)

# With auth token
r = redis.Redis(
    host='prod-redis-cluster.xxx.cache.amazonaws.com',
    port=6379,
    password='my-auth-token',
    decode_responses=True
)

# With TLS
r = redis.Redis(
    host='prod-redis-cluster.xxx.cache.amazonaws.com',
    port=6379,
    password='my-auth-token',
    ssl=True,
    ssl_cert_reqs=None,
    decode_responses=True
)

# Cluster mode enabled
from redis.cluster import RedisCluster
rc = RedisCluster(
    host='prod-redis-sharded.xxx.cache.amazonaws.com',
    port=6379,
    password='my-auth-token',
    ssl=True
)
```

### Memcached Connection (Python)

```python
import pymemcache.client.base

client = pymemcache.client.base.Client(
    ('prod-memcached.xxx.cache.amazonaws.com', 11211)
)

# Set
client.set('key', 'value', expire=3600)

# Get
value = client.get('key')

# Multiple nodes
from pymemcache.client.hash import HashClient

client = HashClient([
    ('prod-memcached.xxx.cache.amazonaws.com', 11211),
    ('prod-memcached-002.xxx.cache.amazonaws.com', 11211),
    ('prod-memcached-003.xxx.cache.amazonaws.com', 11211)
])
```