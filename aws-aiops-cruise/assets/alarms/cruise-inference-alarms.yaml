# CloudWatch Alarm Definitions for aws-aiops-cruise Inference Rules
#
# Deploy: aws-cloudwatch-ops put-composite-alarm (or per-alarm via CloudFormation)
# Placeholders: {{env.*}} from .env, {{user.*}} from user input
# Reference format: aws-cloudwatch-ops/assets/example-config.yaml (see FinOps tips there)
#
# Inference rules from: _inference.py + inference-rules.md
# Thresholds: WARN = alarm threshold, CRIT = documented in comments (escalation)
#
# ==== 16 inference rules mapped to CloudWatch alarms ====

# --- RDS-CONN-01: RDS connection count elevated ---
# Inference: connections >= 70% of max_connections → WARNING, >= 85% → CRITICAL
# Note: Dynamic threshold — depends on instance max_connections parameter
rds_conn_alarm:
  AlarmName: "Cruise-RDS-CONN-01-{{user.resource_id}}"
  AlarmDescription: "RDS connection count elevated (from inference rule RDS-CONN-01)"
  MetricName: DatabaseConnections
  Namespace: AWS/RDS
  Dimensions:
    - Name: DBInstanceIdentifier
      Value: "{{user.resource_id}}"
  Statistic: Average
  Period: 300
  EvaluationPeriods: 2
  DatapointsToAlarm: 2
  # DYNAMIC THRESHOLD: This is a percentage of max_connections (WARN: 70%, CRIT: 85%).
  # User must fill this value as: max_connections * 0.70
  # Example: if max_connections = 200, set Threshold: 140
  Threshold: null
  ComparisonOperator: GreaterThanThreshold
  TreatMissingData: notBreaching
  AlarmActions:
    - "arn:aws:sns:{{env.AWS_DEFAULT_REGION}}:{{env.AWS_ACCOUNT_ID}}:{{user.sns_topic_name}}"

# --- RDS-LAT-01: RDS read/write latency elevated ---
# Inference: latency >= 0.02s → WARNING, >= 0.1s → CRITICAL
# Source: _inference.py RDS-LAT-01, threshold_warning=0.02, threshold_critical=0.1
rds_lat_alarm:
  AlarmName: "Cruise-RDS-LAT-01-{{user.resource_id}}"
  AlarmDescription: "RDS read/write latency elevated (from inference rule RDS-LAT-01, CRIT at 0.1)"
  MetricName: ReadLatency
  Namespace: AWS/RDS
  Dimensions:
    - Name: DBInstanceIdentifier
      Value: "{{user.resource_id}}"
  ExtendedStatistic: p95
  Period: 300
  EvaluationPeriods: 2
  DatapointsToAlarm: 2
  Threshold: 0.02
  ComparisonOperator: GreaterThanThreshold
  TreatMissingData: notBreaching
  AlarmActions:
    - "arn:aws:sns:{{env.AWS_DEFAULT_REGION}}:{{env.AWS_ACCOUNT_ID}}:{{user.sns_topic_name}}"

