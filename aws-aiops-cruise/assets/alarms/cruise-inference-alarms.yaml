# --- SEC-ROTATE-01: Secret rotation stale or disabled ---
# Inference: rotation age > 90d → WARNING, > 180d or rotation disabled → CRITICAL
# Source: _inference.py SEC-ROTATE-01, threshold_warning=90, threshold_critical=180
# NOTE: RotationAgeDays is a COMPUTED value (not a raw CloudWatch metric).
# This rule cannot be directly expressed as a CloudWatch alarm.
# It requires a custom metric computed from SecretsManager secret metadata
# (LastRotatedDate, RotationEnabled) published as a custom CloudWatch metric.
sec_rotate_alarm:
  # Placeholder — not directly expressible as CloudWatch alarm.
  # SEC-ROTATE-01 depends on computed RotationAgeDays from secret metadata.
  # Implementation options:
  #   A. Lambda-backed custom metric: publish RotationAgeDays to custom namespace
  #   B. EventBridge rule: check secret rotation on schedule, publish to CloudWatch
  #   C. AWS Config rule: periodic check against secret last-rotated timestamp
  # Thresholds: WARNING=90 days, CRITICAL=180 days
  AlarmName: "Cruise-SEC-ROTATE-01-{{user.resource_id}}"
  AlarmDescription: "[PLACEHOLDER] Secret rotation stale (from inference rule SEC-ROTATE-01) — requires custom metric"
  # No standard CloudWatch metric exists for this rule
