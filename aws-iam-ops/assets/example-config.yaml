# IAM Policy & Trust Examples (YAML Anchors)
# ===========================================
# Use YAML anchors to avoid repeating common policy structures.

# Shared policy skeleton
x-policy: &policy
  Version: "2012-10-17"

x-trust: &trust
  <<: *policy
  Statement:
    - Effect: "Allow"
      Action: "sts:AssumeRole"

# --- Trust Policies ---

trust_policies:
  ec2_service:
    <<: *trust
    Statement:
      - Effect: "Allow"
        Principal: {Service: "ec2.amazonaws.com"}
        Action: "sts:AssumeRole"

  lambda_service:
    <<: *trust
    Statement:
      - Effect: "Allow"
        Principal: {Service: "lambda.amazonaws.com"}
        Action: "sts:AssumeRole"

  cross_account:
    <<: *trust
    Statement:
      - Effect: "Allow"
        Principal: {AWS: "arn:aws:iam::{{user.account_id}}:root"}
        Action: "sts:AssumeRole"
        Condition: {StringEquals:
            {"aws:PrincipalOrg": "{{user.org_id}}"}}

# --- Permission Policies ---

permission_policies:
  s3_readonly:
    <<: *policy
    Statement:
      - Effect: "Allow"
        Action: ["s3:GetObject", "s3:ListBucket"]
        Resource:
          - "arn:aws:s3:::{{user.bucket_name}}"
          - "arn:aws:s3:::{{user.bucket_name}}/*"

  s3_fullaccess:
    <<: *policy
    Statement:
      - Effect: "Allow"
        Action: "s3:*"
        Resource:
          - "arn:aws:s3:::{{user.bucket_name}}"
          - "arn:aws:s3:::{{user.bucket_name}}/*"

  ec2_describe:
    <<: *policy
    Statement:
      - Effect: "Allow"
        Action: "ec2:Describe*"
        Resource: "*"

  lambda_basic_exec:
    <<: *policy
    Statement:
      - Effect: "Allow"
        Action: ["logs:CreateLogGroup", "logs:CreateLogStream", "logs:PutLogEvents"]
        Resource: "arn:aws:logs:*:*:*"

  permission_boundary_s3:
    <<: *policy
    Statement:
      - Effect: "Allow"
        Action: "s3:*"
        Resource: "*"

  org_scp_leave:
    <<: *policy
    Statement:
      - Effect: "Deny"
        Action: "organizations:LeaveOrganization"
        Resource: "*"

# --- KeyPair Config (Reference) ---
keypair_config:
  KeyName: "{{user.key_name}}"
  KeyType: "ed25519"
  KeyFormat: "pem"