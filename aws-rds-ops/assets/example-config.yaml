# RDS Example Configurations

YAML anchors used for shared defaults:
```yaml
# Shared defaults
x-dev: &dev
  storage_type: "gp3"
  multi_az: false
  publicly_accessible: false
  auto_minor_version_upgrade: true

x-prod: &prod
  storage_type: "gp3"
  multi_az: true
  storage_encrypted: true
  deletion_protection: true
  publicly_accessible: false
  auto_minor_version_upgrade: false
  monitoring_interval: 60
  performance_insights: {enabled: true, retention_period: 7}
```

## MySQL — Dev & Prod
```yaml
# Dev
db_instance:
  <<: *dev
  identifier: "dev-mysql-main"; engine: "mysql"; engine_version: "8.0.35"
  instance_class: "db.t3.micro"; allocated_storage: 20
  master_username: "admin"; master_user_password: "{{user.MasterPassword}}"
  vpc_security_group_ids: ["sg-dev-mysql"]; db_subnet_group_name: "dev-db-subnets"
  backup_retention_period: 1
  tags: [{Key: Environment, Value: development}, {Key: Application, Value: backend-api}]

# Prod
db_instance:
  <<: *prod
  identifier: "prod-mysql-orders"; engine: "mysql"; engine_version: "8.0.35"
  instance_class: "db.r6g.xlarge"; allocated_storage: 500
  master_username: "admin"; master_user_password: "{{user.MasterPassword}}"
  vpc_security_group_ids: ["sg-prod-mysql-orders"]; db_subnet_group_name: "prod-db-subnets"
  backup_retention_period: 14; kms_key_id: "{{user.KmsKeyId}}"
  monitoring_role_arn: "{{user.MonitoringRoleArn}}"
  tags: [{Key: Environment, Value: production}, {Key: Application, Value: orders-service}]
```

## PostgreSQL — Dev & Prod
```yaml
# Dev
db_instance:
  <<: *dev
  identifier: "dev-postgres-analytics"; engine: "postgres"; engine_version: "15.4"
  instance_class: "db.t4g.micro"; allocated_storage: 20
  master_username: "postgres"; vpc_security_group_ids: ["sg-dev-postgres"]
  tags: [{Key: Environment, Value: development}]

# Prod
db_instance:
  <<: *prod
  identifier: "prod-postgres-users"; engine: "postgres"; engine_version: "15.4"
  instance_class: "db.r6g.2xlarge"; allocated_storage: 200
  storage_type: "io1"; iops: 1000  # Provisioned IOPS for high write workload
  master_username: "postgres"; vpc_security_group_ids: ["sg-prod-postgres-users"]
  backup_retention_period: 30
  tags: [{Key: Environment, Value: production}, {Key: Application, Value: user-service}]
```

## Aurora MySQL Cluster
```yaml
# Production Aurora
aurora_cluster:
  identifier: "prod-aurora-catalog"; engine: "aurora-mysql"
  engine_version: "8.0.mysql_aurora.3.02.2"
  cluster_parameter_group_name: "aurora-mysql8.0-prod"
  master_username: "admin"; master_user_password: "{{user.MasterPassword}}"
  vpc_security_group_ids: ["sg-prod-aurora-catalog"]
  db_subnet_group_name: "prod-db-subnets"
  backup_retention_period: 14; storage_encrypted: true
  kms_key_id: "{{user.KmsKeyId}}"; deletion_protection: true
  tags: [{Key: Environment, Value: production}, {Key: Application, Value: catalog-service}]
  instances:
    - identifier: "prod-aurora-catalog-writer";  instance_class: "db.r6g.xlarge"; promotion_tier: 1
    - identifier: "prod-aurora-catalog-reader-1"; instance_class: "db.r6g.large";   promotion_tier: 2
    - identifier: "prod-aurora-catalog-reader-2"; instance_class: "db.r6g.large";   promotion_tier: 2

# Aurora Serverless v2
aurora_cluster:
  identifier: "aurora-serverless-analytics"; engine: "aurora-mysql"
  tags: [{Key: WorkloadType, Value: unpredictable}]
  instances:
    - identifier: "aurora-analytics-serverless"; instance_class: "db.serverless"
      serverless_v2_scaling_configuration: {min_capacity: 0.5, max_capacity: 32}
```

## Parameter Groups

### MySQL 8.0 Production
```yaml
parameter_group:
  name: "mysql8.0-prod-optimized"; family: "mysql8.0"
  parameters:
    - {name: "max_connections",              value: "1000",                apply_method: "immediate"}
    - {name: "innodb_buffer_pool_size",       value: "13421772800",        apply_method: "pending-reboot"}  # 12.5GB (16GB inst)
    - {name: "slow_query_log",                value: "1",                  apply_method: "immediate"}
    - {name: "long_query_time",               value: "2",                  apply_method: "immediate"}
    - {name: "innodb_flush_log_at_trx_commit", value: "1",                 apply_method: "immediate"}
    - {name: "innodb_log_file_size",          value: "134217728",          apply_method: "pending-reboot"}  # 128MB
    - {name: "wait_timeout",                  value: "600",                apply_method: "immediate"}
```

### PostgreSQL 15 Production
```yaml
parameter_group:
  name: "postgres15-prod-optimized"; family: "postgres15"
  parameters:
    - {name: "max_connections",              value: "300",                 apply_method: "pending-reboot"}
    - {name: "shared_buffers",               value: "4194304",             apply_method: "pending-reboot"}  # 4GB (16GB inst)
    - {name: "effective_cache_size",         value: "12582912",            apply_method: "immediate"}        # 12GB
    - {name: "work_mem",                     value: "25600",               apply_method: "immediate"}        # 25MB
    - {name: "maintenance_work_mem",         value: "1048576",             apply_method: "immediate"}        # 1GB
    - {name: "log_min_duration_statement",   value: "500",                 apply_method: "immediate"}        # Log >500ms
    - {name: "autovacuum",                   value: "on",                  apply_method: "immediate"}
```

### Aurora MySQL Production
```yaml
parameter_group:
  name: "aurora-mysql8.0-prod"; family: "aurora-mysql8.0"
  parameters:
    - {name: "max_connections",               value: "2000",               apply_method: "immediate"}
    - {name: "innodb_buffer_pool_size",        value: "21474836480",        apply_method: "pending-reboot"}  # 20GB
    - {name: "aurora_disable_backtracking",    value: "0",                  apply_method: "immediate"}
```

## Read Replicas
```yaml
# Cross-AZ (MySQL)
read_replica:
  source_identifier: "prod-mysql-orders"; replica_identifier: "prod-mysql-orders-reader-1"
  instance_class: "db.r6g.large"; availability_zone: "us-east-1b"

# Cross-Region
read_replica:
  source_identifier: "arn:aws:rds:us-east-1:123456789012:db:prod-mysql-orders"
  replica_identifier: "prod-mysql-orders-eu-reader"; region: "eu-west-1"
  kms_key_id: "{{user.EuKmsKeyId}}"
```

## Snapshot Operations
```yaml
# Create
snapshot:
  operation: "create"; instance_identifier: "prod-mysql-orders"
  snapshot_identifier: "prod-mysql-orders-pre-upgrade-20260510"

# Restore (can change config)
restore:
  operation: "restore"; snapshot_identifier: "prod-mysql-orders-pre-upgrade-20260510"
  new_instance: {identifier: "prod-mysql-orders-restored", instance_class: "db.r6g.xlarge"}
```

## Deletion
```yaml
# With final snapshot (recommended for production)
deletion:
  operation: "delete"; instance_identifier: "old-mysql-instance"
  final_snapshot_identifier: "old-mysql-instance-final-20260510"
  confirmation_required: true; confirmation_string: "DELETE old-mysql-instance"

# Skip final snapshot (temporary/test only — data loss)
deletion:
  operation: "delete"; instance_identifier: "temp-restore-test"
  skip_final_snapshot: true; confirmation_required: true
```