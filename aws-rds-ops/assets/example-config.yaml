# RDS Example Configurations

Configuration examples for AWS RDS operations.

## MySQL Instance

### Development MySQL
```yaml
db_instance:
  identifier: "dev-mysql-main"
  engine: "mysql"
  engine_version: "8.0.35"
  instance_class: "db.t3.micro"
  allocated_storage: 20
  storage_type: "gp3"
  master_username: "admin"
  master_user_password: "{{user.MasterPassword}}"
  vpc_security_group_ids:
    - "sg-dev-mysql"
  db_subnet_group_name: "dev-db-subnets"
  availability_zone: "us-east-1a"
  multi_az: false
  backup_retention_period: 1
  preferred_backup_window: "03:00-04:00"
  preferred_maintenance_window: "sun:04:00-sun:05:00"
  storage_encrypted: false
  deletion_protection: false
  publicly_accessible: false
  auto_minor_version_upgrade: true
  performance_insights:
    enabled: false
  tags:
    - Key: Environment
      Value: development
    - Key: Application
      Value: backend-api
```

### Production MySQL
```yaml
db_instance:
  identifier: "prod-mysql-orders"
  engine: "mysql"
  engine_version: "8.0.35"
  instance_class: "db.r6g.xlarge"
  allocated_storage: 500
  storage_type: "gp3"
  storage_iops: 3000  # Provisioned IOPS for gp3
  master_username: "admin"
  master_user_password: "{{user.MasterPassword}}"  # Use Secrets Manager
  vpc_security_group_ids:
    - "sg-prod-mysql-orders"
  db_subnet_group_name: "prod-db-subnets"
  multi_az: true
  backup_retention_period: 14
  preferred_backup_window: "02:00-03:00"
  preferred_maintenance_window: "sun:03:00-sun:04:00"
  storage_encrypted: true
  kms_key_id: "{{user.KmsKeyId}}"
  deletion_protection: true
  publicly_accessible: false
  auto_minor_version_upgrade: false
  monitoring_interval: 60
  monitoring_role_arn: "{{user.MonitoringRoleArn}}"
  performance_insights:
    enabled: true
    retention_period: 7
  tags:
    - Key: Environment
      Value: production
    - Key: Application
      Value: orders-service
    - Key: CostCenter
      Value: operations
```

