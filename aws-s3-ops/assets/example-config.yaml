# S3 Bucket & Object Configuration Examples (YAML Anchors)
# ==========================================================
# Template: Replace {{user.*}} placeholders at runtime.
# Use YAML anchors to avoid repeating common policy structures.

# Shared policy skeleton
x-policy: &policy
  Version: "2012-10-17"

# --- Bucket Policies ---

bucket_policies:
  public_read:
    <<: *policy
    Statement:
      - Sid: "PublicReadGetObject"
        Effect: "Allow"
        Principal: "*"
        Action: "s3:GetObject"
        Resource: "arn:aws:s3:::{{user.bucket_name}}/*"

  sse_s3_encryption:
    Rules:
      - ApplyServerSideEncryptionByDefault: {SSEAlgorithm: "AES256"}
        BucketKeyEnabled: false

# --- Lifecycle Policy ---

lifecycle_policy:
  Rules:
    - ID: "TransitionToGlacier"
      Status: "Enabled"
      Filter: {}
      Transitions:
        - {Days: 90, StorageClass: "GLACIER"}
      Expiration: {Days: 365}

# --- Versioning ---
versioning: {Status: "Enabled"}

# --- CORS ---
cors:
  CORSRules:
    - AllowedOrigins: ["*"]
      AllowedMethods: ["GET", "PUT", "POST", "DELETE", "HEAD"]
      AllowedHeaders: ["*"]
      MaxAgeSeconds: 3000
      ExposeHeaders: ["ETag"]