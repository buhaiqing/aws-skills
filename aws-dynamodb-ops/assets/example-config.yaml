## Conditional Write Examples

### Put with Condition (Prevent Overwrite)
```yaml
operation: put_item
condition_expression: "attribute_not_exists(user_id)"
item:
  user_id:
    S: "user-new"
  email:
    S: "newuser@example.com"
  created_at:
    S: "2024-06-15T10:30:00Z"
```

### Update with Condition
```yaml
operation: update_item
key:
  user_id:
    S: "user-12345"
update_expression: "SET profile.preferences.theme = :theme, updated_at = :now"
condition_expression: "attribute_exists(user_id) AND metadata.last_login > :min_date"
expression_attribute_values:
  ":theme":
    S: "light"
  ":now":
    S: "2024-06-15T12:00:00Z"
  ":min_date":
    S: "2024-01-01T00:00:00Z"
```

### Increment Counter
```yaml
operation: update_item
key:
  counter_name:
    S: "page_views"
update_expression: "SET counter_value = if_not_exists(counter_value, :zero) + :inc"
expression_attribute_values:
  ":zero":
    N: "0"
  ":inc":
    N: "1"
return_values: UPDATED_NEW
```

## Query Examples

### Query by Partition Key
```yaml
operation: query
table_name: "orders-prod"
key_condition_expression: "order_id = :order_id"
expression_attribute_values:
  ":order_id":
    S: "ORD-2024-001234"
consistent_read: false  # Use eventual consistency
limit: 1
```

### Query with Sort Key Range
```yaml
operation: query
table_name: "orders-prod"
key_condition_expression: "user_id = :user_id AND created_at BETWEEN :start AND :end"
expression_attribute_values:
  ":user_id":
    S: "user-12345"
  ":start":
    S: "2024-06-01T00:00:00Z"
  ":end":
    S: "2024-06-30T23:59:59Z"
scan_index_forward: false  # Descending order (newest first)
limit: 100
```

### Query GSI
```yaml
operation: query
table_name: "orders-prod"
index_name: "StatusIndex"
key_condition_expression: "status = :status AND created_at > :date"
expression_attribute_values:
  ":status":
    S: "pending"
  ":date":
    S: "2024-06-14T00:00:00Z"
filter_expression: "order_total > :min_amount"
expression_attribute_values:
  ":min_amount":
    N: "50.00"
```

## Stream Configuration

### Lambda Trigger Configuration
```yaml
stream_event_source_mapping:
  function_name: "process-dynamodb-stream"
  event_source_arn: "arn:aws:dynamodb:us-east-1:123456789012:table/orders-prod/stream/2024-01-01T00:00:00.000"
  
  # Batch settings
  batch_size: 100
  batch_window: 5  # seconds
  
  # Starting position
  starting_position: TRIM_HORIZON  # LATEST or TRIM_HORIZON
  
  # Parallelization
  parallelization_factor: 2
  
  # Retry and DLQ
  maximum_retry_attempts: 3
  maximum_record_age_in_seconds: 86400
  destination_config:
    on_failure:
      destination: "arn:aws:sns:us-east-1:123456789012:dynamodb-stream-dlq"
  
  # Filter (optional)
  filter_criteria:
    filters:
      - pattern: '{"eventName": ["INSERT", "MODIFY"]}'
```

## Backup Configuration

### On-Demand Backup
```yaml
backup:
  type: on_demand
  table_name: "orders-prod"
  backup_name: "orders-pre-migration-2024-06-15"
  
  tags:
    - Key: Purpose
      Value: "pre-migration-backup"
    - Key: CreatedBy
      Value: "ops-team"
```

### Point-in-Time Recovery
```yaml
point_in_time_recovery:
  table_name: "orders-prod"
  enabled: true
  
  # To restore to point in time
restore:
  source_table: "orders-prod"
  target_table: "orders-restored-2024-06-15"
  restore_date_time: "2024-06-14T10:00:00Z"  # Within last 35 days
```

## Complete Workflow

### Create Production Table Flow
```yaml
workflow:
  name: "create-production-table"
  
  steps:
    # 1. Pre-flight
    - step: "preflight"
      actions:
        - "Verify table name unique"
        - "Check IAM permissions"
        - "Validate KMS key exists"
    
    # 2. Create table
    - step: "create_table"
      config:
        billing_mode: PROVISIONED
        partition_key: "user_id"
        sort_key: "created_at"
        rcu: 50
        wcu: 25
    
    # 3. Enable auto-scaling
    - step: "enable_auto_scaling"
      config:
        read_target: 70
        write_target: 70
    
    # 4. Create GSI
    - step: "create_gsi"
      config:
        index_name: "EmailIndex"
        partition_key: "email"
        rcu: 25
        wcu: 10
    
    # 5. Wait for ACTIVE
    - step: "wait"
      for: "table_active"
      timeout: 600  # seconds
    
    # 6. Configure TTL
    - step: "enable_ttl"
      attribute: "ttl"
    
    # 7. Enable PITR
    - step: "enable_pitr"
    
    # 8. Create initial backup
    - step: "create_backup"
      name: "initial-backup"
    
    # 9. Output table ARN
    - step: "output"
      fields:
        - "table_arn"
        - "table_status"
        - "gsi_count"
```