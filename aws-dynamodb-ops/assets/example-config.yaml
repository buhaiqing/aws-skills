# DynamoDB Example Configurations

Configuration examples for AWS DynamoDB operations.

## Provisioned Capacity Table

### Basic Provisioned Table
```yaml
table:
  name: "user-profiles-prod"
  billing_mode: PROVISIONED
  
  # Primary Key
  partition_key:
    name: "user_id"
    type: "S"  # String
  
  # Optional Sort Key
  sort_key:
    name: "created_at"
    type: "S"  # ISO 8601 timestamp
  
  # Capacity
  provisioned_throughput:
    read_capacity_units: 50
    write_capacity_units: 25
  
  # Auto-scaling (recommended)
  auto_scaling:
    read:
      min_capacity: 50
      max_capacity: 1000
      target_utilization: 70
    write:
      min_capacity: 25
      max_capacity: 500
      target_utilization: 70
  
  # Server-side encryption
  sse_specification:
    enabled: true
    sse_type: KMS
    kms_key_id: "{{user.KmsKeyId}}"  # Optional, uses AWS managed key if not specified
  
  # Point-in-time recovery
  point_in_time_recovery:
    enabled: true
  
  # Tags
  tags:
    - Key: Environment
      Value: production
    - Key: Application
      Value: user-service
    - Key: Owner
      Value: platform-team
```

### Production Table with GSI
```yaml
table:
  name: "orders-prod"
  billing_mode: PROVISIONED
  
  partition_key:
    name: "order_id"
    type: "S"
  
  sort_key:
    name: "created_at"
    type: "S"
  
  provisioned_throughput:
    read_capacity_units: 100
    write_capacity_units: 50
  
  # Global Secondary Indexes
  global_secondary_indexes:
    - name: "UserIndex"
      key_schema:
        - AttributeName: "user_id"
          KeyType: HASH
        - AttributeName: "created_at"
          KeyType: RANGE
      projection:
        projection_type: INCLUDE
        non_key_attributes:
          - "order_total"
          - "status"
      provisioned_throughput:
        read_capacity_units: 50
        write_capacity_units: 25
      
    - name: "StatusIndex"
      key_schema:
        - AttributeName: "status"
          KeyType: HASH
        - AttributeName: "created_at"
          KeyType: RANGE
      projection:
        projection_type: KEYS_ONLY
      provisioned_throughput:
        read_capacity_units: 25
        write_capacity_units: 10
  
  # Time to Live
  ttl:
    enabled: true
    attribute_name: "ttl"
  
  # Streams for event-driven
  streams:
    enabled: true
    view_type: NEW_AND_OLD_IMAGES
  
  # Tags
  tags:
    - Key: Environment
      Value: production
    - Key: DataClassification
      Value: sensitive
```

## On-Demand Capacity Table

### Development Table
```yaml
table:
  name: "events-dev"
  billing_mode: PAY_PER_REQUEST  # On-demand
  
  partition_key:
    name: "event_id"
    type: "S"
  
  sort_key:
    name: "timestamp"
    type: "N"  # Unix timestamp
  
  # No capacity units needed for on-demand
  
  # TTL for automatic cleanup
  ttl:
    enabled: true
    attribute_name: "expiration_time"
  
  # Minimal GSI for dev
  global_secondary_indexes:
    - name: "DeviceIndex"
      key_schema:
        - AttributeName: "device_id"
          KeyType: HASH
      projection:
        projection_type: ALL
      # On-demand GSI - no capacity needed
  
  tags:
    - Key: Environment
      Value: development
    - Key: CostCenter
      Value: development
```

### Time-Series Table with Sharding
```yaml
table:
  name: "metrics-timeseries"
  billing_mode: PAY_PER_REQUEST
  
  # Sharded partition key to avoid hot partitions
  partition_key:
    name: "shard_key"  # Format: device_id#YYYY-MM-DD#random(0-9)
    type: "S"
  
  sort_key:
    name: "timestamp"
    type: "N"
  
  attribute_definitions:
    - AttributeName: "shard_key"
      AttributeType: "S"
    - AttributeName: "timestamp"
      AttributeType: "N"
    - AttributeName: "device_id"
      AttributeType: "S"
    - AttributeName: "metric_date"
      AttributeType: "S"
  
  # GSI for querying by device without date
  global_secondary_indexes:
    - name: "DeviceMetricsIndex"
      key_schema:
        - AttributeName: "device_id"
          KeyType: HASH
        - AttributeName: "timestamp"
          KeyType: RANGE
      projection:
        projection_type: ALL
    
    - name: "DateMetricsIndex"
      key_schema:
        - AttributeName: "metric_date"
          KeyType: HASH
        - AttributeName: "timestamp"
          KeyType: RANGE
      projection:
        projection_type: INCLUDE
        non_key_attributes:
          - "device_id"
          - "metric_value"
  
  ttl:
    enabled: true
    attribute_name: "ttl"
  
  tags:
    - Key: Environment
      Value: production
    - Key: Application
      Value: metrics-aggregator
```

## Item Examples

### User Profile Item
```yaml
item:
  table_name: "user-profiles-prod"
  
  attributes:
    user_id:
      S: "user-12345"
    
    email:
      S: "user@example.com"
    
    profile:
      M:  # Map type
        first_name:
          S: "John"
        last_name:
          S: "Doe"
        preferences:
          M:
            theme:
              S: "dark"
            notifications:
              BOOL: true
    
    roles:
      SS:  # String Set
        - "user"
        - "premium"
    
    metadata:
      M:
        created_at:
          S: "2024-01-15T10:30:00Z"
        last_login:
          S: "2024-06-15T08:45:00Z"
        login_count:
          N: "42"
    
    tags:
      L:  # List
        - S: "active"
        - S: "verified"
    
    # TTL attribute (Unix timestamp)
    ttl:
      N: "1750000000"
```

### Order Item with Binary Data
```yaml
item:
  table_name: "orders-prod"
  
  attributes:
    order_id:
      S: "ORD-2024-001234"
    
    user_id:
      S: "user-12345"
    
    created_at:
      S: "2024-06-15T10:30:00Z"
    
    status:
      S: "processing"
    
    items:
      L:
        - M:
            product_id:
              S: "PROD-001"
