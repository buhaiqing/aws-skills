# DynamoDB Configuration Examples (YAML Anchors)
# ===============================================
# Template: Replace {{user.*}} placeholders at runtime.
# Use YAML anchors to avoid repeating common settings.

# --- Shared Anchors ---
x-billing-provisioned: &billing-provisioned
  BillingMode: PAY_PER_REQUEST

x-billing-on-demand: &billing-on-demand
  BillingMode: PAY_PER_REQUEST

x-rcu-wcu: &rcu-wcu
  ReadCapacityUnits: "{{user.RCU:5}}"
  WriteCapacityUnits: "{{user.WCU:5}}"

x-tags: &tags
  Tags:
    - Key: "Name"; Value: "{{user.TableName}}"
    - Key: "Environment"; Value: "{{user.Environment:dev}}"
    - Key: "ManagedBy"; Value: "AI-Agent"

x-ttl-attr: &ttl-attr
  TimeToLiveSpecification:
    AttributeName: "{{user.TTLAttributeName:ttl}}"
    Enabled: true

# --- Example: On-Demand Table ---
on-demand-table: &on-demand-table
  TableName: "{{user.TableName}}"
  KeySchema:
    - AttributeName: "{{user.PrimaryKey}}"
      KeyType: HASH
    {{#if user.SortKey}}
    - AttributeName: "{{user.SortKey}}"
      KeyType: RANGE
    {{/if}}
  BillingMode: PAY_PER_REQUEST
  <<: *tags

# --- Example: Provisioned Table ---
provisioned-table: &provisioned-table
  TableName: "{{user.TableName}}"
  KeySchema:
    - AttributeName: "{{user.PrimaryKey}}"
      KeyType: HASH
  BillingMode: PROVISIONED
  <<: *rcu-wcu
  <<: *tags

# --- Example: Table with GSI ---
table-with-gsi: &table-with-gsi
  TableName: "{{user.TableName}}"
  KeySchema:
    - AttributeName: "{{user.PrimaryKey}}"
      KeyType: HASH
  BillingMode: PAY_PER_REQUEST
  GlobalSecondaryIndexes:
    - IndexName: "{{user.GSIName:gsi1}}"
      KeySchema:
        - AttributeName: "{{user.GSIPartitionKey}}"
          KeyType: HASH
      Projection:
        ProjectionType: ALL
  <<: *tags
