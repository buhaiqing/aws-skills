# VPC Configuration Examples

YAML anchors used for shared defaults:
```yaml
x-public: &pub
  type: "public"
  auto_assign_public_ip: true

x-private: &priv
  type: "private"

x-prod: &prod
  region: "{{env.AWS_DEFAULT_REGION}}"
  enable_dns_support: true
  enable_dns_hostnames: true
```

## Basic VPC with Public/Private Subnets
```yaml
vpc:
  <<: *prod
  name: "production-vpc"; cidr_block: "10.0.0.0/16"
  internet_gateway: {name: "production-igw"}
  subnets:
    - <<: *pub; name: "prod-public-1a";  cidr_block: "10.0.1.0/24"; availability_zone: "{{env.AWS_DEFAULT_REGION}}a"
    - <<: *pub; name: "prod-public-1b";  cidr_block: "10.0.2.0/24"; availability_zone: "{{env.AWS_DEFAULT_REGION}}b"
    - <<: *priv; name: "prod-private-1a"; cidr_block: "10.0.3.0/24"; availability_zone: "{{env.AWS_DEFAULT_REGION}}a"
    - <<: *priv; name: "prod-private-1b"; cidr_block: "10.0.4.0/24"; availability_zone: "{{env.AWS_DEFAULT_REGION}}b"
  route_tables:
    - name: "prod-public-rt"
      subnet_associations: ["prod-public-1a", "prod-public-1b"]
      routes: [{destination: "0.0.0.0/0", target: "production-igw"}]
    - name: "prod-private-rt"
      subnet_associations: ["prod-private-1a", "prod-private-1b"]
      routes: [{destination: "0.0.0.0/0", target: "prod-natgw-1a"}]
  nat_gateways:
    - name: "prod-natgw-1a"; subnet: "prod-public-1a"; elastic_ip: {name: "prod-eip-1a"}
```

## Development/Testing VPC (Cost-Optimized)
```yaml
vpc:
  <<: *prod
  name: "dev-vpc"; cidr_block: "192.168.0.0/16"
  internet_gateway: {name: "dev-igw"}
  subnets:
    - <<: *pub; name: "dev-public";  cidr_block: "192.168.1.0/24"; availability_zone: "{{env.AWS_DEFAULT_REGION}}a"
    - <<: *priv; name: "dev-private"; cidr_block: "192.168.2.0/24"; availability_zone: "{{env.AWS_DEFAULT_REGION}}a"
  route_tables:
    - name: "dev-public-rt";  subnet_associations: ["dev-public"];  routes: [{destination: "0.0.0.0/0", target: "dev-igw"}]
    - name: "dev-private-rt"; subnet_associations: ["dev-private"]; routes: [{destination: "0.0.0.0/0", target: "dev-natgw"}]
  nat_gateways: [{name: "dev-natgw", subnet: "dev-public", elastic_ip: {name: "dev-eip"}}]
```

## Security Group Examples
```yaml
security_groups:
  # Web server
  - name: "web-server-sg"; description: "Web server"
    ingress_rules:
      - {protocol: "tcp", from_port: 80,  to_port: 80,  cidr_blocks: ["0.0.0.0/0"], description: "HTTP"}
      - {protocol: "tcp", from_port: 443, to_port: 443, cidr_blocks: ["0.0.0.0/0"], description: "HTTPS"}
    egress_rules: [{protocol: "-1", from_port: 0, to_port: 0, cidr_blocks: ["0.0.0.0/0"]}]

  # Application tier
  - name: "app-sg"
    ingress_rules:
      - {protocol: "tcp", from_port: 8080, to_port: 8080, source_security_groups: ["{{user.lb_sg_id}}"], description: "App from LB"}
      - {protocol: "tcp", from_port: 22, to_port: 22, source_security_groups: ["{{user.bastion_sg_id}}"], description: "SSH from bastion"}

  # Database tier
  - name: "data-sg"; description: "Database — no internet"
    ingress_rules:
      - {protocol: "tcp", from_port: 3306, to_port: 3306, source_security_groups: ["{{user.app_sg_id}}"], description: "MySQL from app"}
    egress_rules: [{protocol: "-1", from_port: 0, to_port: 0, cidr_blocks: ["{{user.vpc_cidr}}"], description: "VPC internal only"}]
```

## VPC Peering
```yaml
vpc_peering:
  requester: {vpc_cidr: "10.0.0.0/16", region: "{{env.AWS_DEFAULT_REGION}}"}
  accepter:  {vpc_cidr: "10.1.0.0/16", region: "{{env.AWS_DEFAULT_REGION}}"}
  routes:  # Both sides must add
    requester_route: [{destination: "10.1.0.0/16", target: "{{user.peer_conn_id}}"}]
    accepter_route:  [{destination: "10.0.0.0/16", target: "{{user.peer_conn_id}}"}]
```