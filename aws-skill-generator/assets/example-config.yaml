# Example AWS Credentials Configuration
# This file is for documentation only - NEVER commit real credentials

# Environment variables (recommended for SDK)
AWS_ACCESS_KEY_ID=your_access_key_here
AWS_SECRET_ACCESS_KEY=your_secret_key_here
AWS_DEFAULT_REGION=us-east-1

# Alternative: AWS CLI config file format (~/.aws/credentials)
# [default]
# aws_access_key_id = your_access_key_here
# aws_secret_access_key = your_secret_key_here
#
# ~/.aws/config
# [default]
# region = us-east-1
# output = json