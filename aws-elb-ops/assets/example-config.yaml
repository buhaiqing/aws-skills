### Health Check Adaptive Configuration

```yaml
# AIOps: Recommended health check params by workload type
health_check_profiles:
  api_service:
    description: "Latency-sensitive API"
    interval_seconds: 10
    timeout_seconds: 3
    healthy_threshold: 3
    unhealthy_threshold: 2
    matcher: { http_code: "200,201,204" }

  batch_processing:
    description: "Tolerant of normal variance"
    interval_seconds: 60
    timeout_seconds: 10
    healthy_threshold: 5
    unhealthy_threshold: 3
    matcher: { http_code: "200-299" }

  database:
    description: "TCP-based, precise detection"
