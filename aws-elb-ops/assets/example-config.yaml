## Classic Load Balancer (CLB - Legacy)

### Basic CLB Setup

```yaml
load_balancer:
  name: my-classic-lb
  scheme: internet-facing

  listeners:
    - protocol: HTTP
      load_balancer_port: 80
      instance_protocol: HTTP
      instance_port: 80

  subnets:
    - subnet-aaa
    - subnet-bbb

  security_groups:
    - sg-web

health_check:
  target: HTTP:80/health
  interval: 30
  timeout: 5
  unhealthy_threshold: 2
  healthy_threshold: 10

instances:
  - i-aaa
  - i-bbb
```

### CLB with SSL

```yaml
load_balancer:
  name: my-secure-clb

  listeners:
    - protocol: HTTPS
      load_balancer_port: 443
      instance_protocol: HTTP
      instance_port: 80
      ssl_certificate_id: arn:aws:iam::123456789:server-certificate/my-cert

instances:
  - i-aaa
  - i-bbb
```

## Load Balancer Attributes

### ALB Attributes

```yaml
attributes:
  - key: deletion_protection.enabled
    value: true
  - key: idle_timeout.timeout_seconds
    value: 60
  - key: routing.http2.enabled
    value: true
  - key: routing.http.drop_invalid_header_fields.enabled
    value: true
  - key: load_balancing.cross_zone.enabled
    value: true
  - key: access_logs.s3.enabled
    value: true
  - key: access_logs.s3.bucket
    value: my-alb-logs
  - key: access_logs.s3.prefix
    value: alb-logs
```

### NLB Attributes

```yaml
attributes:
  - key: deletion_protection.enabled
    value: true
  - key: load_balancing.cross_zone.enabled
    value: true
  - key: access_logs.s3.enabled
    value: true
  - key: access_logs.s3.bucket
    value: my-nlb-logs
```

## Health Check Variations

### HTTP Health Check

```yaml
health_check:
  protocol: HTTP
  port: 80
  path: /health
  interval_seconds: 30
  timeout_seconds: 5
  healthy_threshold: 5
  unhealthy_threshold: 2
  matcher:
    http_code: "200"
```

### HTTPS Health Check

```yaml
health_check:
  protocol: HTTPS
  port: 443
  path: /health
  interval_seconds: 30
  timeout_seconds: 10
  healthy_threshold: 5
  unhealthy_threshold: 2
  matcher:
    http_code: "200-299"
```

### TCP Health Check (NLB)

```yaml
health_check:
  protocol: TCP
  port: 8080
  interval_seconds: 30
  healthy_threshold: 5
  unhealthy_threshold: 2
```

### Custom Port Health Check

```yaml
health_check:
  protocol: HTTP
  port: traffic_port  # Use same port as traffic
  path: /healthcheck
  interval_seconds: 15
  timeout_seconds: 3
  healthy_threshold: 3
  unhealthy_threshold: 3
  matcher:
    http_code: "200,202"
```

## Target Registration Examples

### EC2 Instances

```yaml
targets:
  - id: i-1234567890abcdef0
    port: 80
  - id: i-1234567890abcdef1
    port: 80
  - id: i-1234567890abcdef2
    port: 8080  # Override port
```

### IP Addresses

```yaml
targets:
  - id: 10.0.1.10
    port: 8080
  - id: 10.0.2.20
    port: 8080
  - id: 10.0.3.30
    availability_zone: all  # Cross-zone target
```

### Lambda Function

```yaml
targets:
  - id: arn:aws:lambda:us-east-1:123456789:function:my-function:1
```