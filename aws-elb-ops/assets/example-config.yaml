## Classic Load Balancer (CLB - Legacy)

### Basic CLB Setup

```yaml
load_balancer:
  name: my-classic-lb
  scheme: internet-facing

  listeners:
    - protocol: HTTP
      load_balancer_port: 80
      instance_protocol: HTTP
      instance_port: 80

  subnets:
    - subnet-aaa
    - subnet-bbb

  security_groups:
    - sg-web

health_check:
  target: HTTP:80/health
  interval: 30
  timeout: 5
  unhealthy_threshold: 2
  healthy_threshold: 10

instances:
  - i-aaa
  - i-bbb
```

### CLB with SSL

```yaml
load_balancer:
  name: my-secure-clb

  listeners:
    - protocol: HTTPS
      load_balancer_port: 443
      instance_protocol: HTTP
      instance_port: 80
      ssl_certificate_id: arn:aws:iam::123456789:server-certificate/my-cert

instances:
  - i-aaa
  - i-bbb
```

## Load Balancer Attributes

### ALB Attributes

```yaml
attributes:
  - key: deletion_protection.enabled
    value: true
  - key: idle_timeout.timeout_seconds
    value: 60
  - key: routing.http2.enabled
    value: true
  - key: routing.http.drop_invalid_header_fields.enabled
    value: true
  - key: load_balancing.cross_zone.enabled
    value: true
  - key: access_logs.s3.enabled
    value: true
  - key: access_logs.s3.bucket
    value: my-alb-logs
  - key: access_logs.s3.prefix
    value: alb-logs
```

