    timeout_seconds: 5
    healthy_threshold: 2
    unhealthy_threshold: 2
```

### AIOps Tags (Mandatory)

```yaml
# All resources must include these tags for automated lifecycle management
tags:
  - Key: AIOps
    Value: "true"
  - Key: AIOpsModule
    Value: "aws-elb-ops"
  - Key: AIOpsVersion
    Value: "2.0.0"
  - Key: Environment
    Value: "{{environment}}"  # production / staging / dev
```