```yaml
health_check:
  protocol: HTTP
  port: 80
  path: /health
  interval_seconds: 30
  timeout_seconds: 5
  healthy_threshold: 5
  unhealthy_threshold: 2
  matcher:
    http_code: "200"
```

### HTTPS Health Check

```yaml
health_check:
  protocol: HTTPS
  port: 443
  path: /health
  interval_seconds: 30
  timeout_seconds: 10
  healthy_threshold: 5
  unhealthy_threshold: 2
  matcher:
    http_code: "200-299"
```

### TCP Health Check (NLB)

```yaml
health_check:
  protocol: TCP
  port: 8080
  interval_seconds: 30
  healthy_threshold: 5
  unhealthy_threshold: 2
```

### Custom Port Health Check

```yaml
health_check:
  protocol: HTTP
  port: traffic_port  # Use same port as traffic
  path: /healthcheck
  interval_seconds: 15
  timeout_seconds: 3
  healthy_threshold: 3
  unhealthy_threshold: 3
  matcher:
    http_code: "200,202"
```

