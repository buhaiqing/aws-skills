      id: <primary-health-check-id>
      ip_address: "10.0.1.100"
      port: 80
      type: HTTP
      resource_path: /health
    backup:
      id: <backup-health-check-id>
      ip_address: "10.1.1.100"
      port: 80
      type: HTTP
      resource_path: /health
  records:
    - name: app.example.com
      type: A
      set_identifier: primary
      region: us-east-1
      failover: PRIMARY
      health_check_id: <primary-health-check-id>
    - name: app.example.com
      type: A
      set_identifier: backup
      region: us-west-2
      failover: SECONDARY
      health_check_id: <backup-health-check-id>
```

