## Monitoring Configuration

### CloudWatch Container Insights

```yaml
# Fluent Bit configuration for CloudWatch
fluent_bit:
  enabled: true
  namespace: amazon-cloudwatch
  config:
    service:
      flush: 1
      log_level: info
    inputs:
      - name: tail
        path: /var/log/containers/*.log
        parser: docker
        tag: kube.*
        refresh_interval: 5
    filters:
      - name: kubernetes
        match: kube.*
        kube_url: https://kubernetes.default.svc:443
        merge_log: true
        keep_log: false
    outputs:
      - name: cloudwatch
        match: "*"
        region: us-east-1
        log_group_name: /aws/eks/my-cluster/application
        log_stream_prefix: from-fluent-bit-
        auto_create_group: true
```

