## New Configuration Examples (2024+)

## EKS Access Entries Configuration

### Create Access Entry for IAM User

```bash
# Create access entry
aws eks create-access-entry \
  --cluster-name my-eks-cluster \
  --region us-east-1 \
  --principal-arn arn:aws:iam::123456789012:user/admin \
  --type STANDARD

# Associate cluster admin policy
aws eks associate-access-policy \
  --cluster-name my-eks-cluster \
  --region us-east-1 \
  --principal-arn arn:aws:iam::123456789012:user/admin \
  --policy-arn arn:aws:eks:us-east-1:123456789012:access-policy/AmazonEKSClusterAdminPolicy \
  --access-scope type=cluster

# Associate namespace-specific policy
aws eks associate-access-policy \
  --cluster-name my-eks-cluster \
  --region us-east-1 \
  --principal-arn arn:aws:iam::123456789012:user/developer \
  --policy-arn arn:aws:eks:us-east-1:123456789012:access-policy/AmazonEKSViewPolicy \
  --access-scope type=namespace,namespaces=dev
```

### Create Access Entry for IAM Role

```bash
# Create access entry for role
aws eks create-access-entry \
  --cluster-name my-eks-cluster \
  --region us-east-1 \
  --principal-arn arn:aws:iam::123456789012:role/eks-admin \
  --type STANDARD

# Associate edit policy
aws eks associate-access-policy \
  --cluster-name my-eks-cluster \
  --region us-east-1 \
  --principal-arn arn:aws:iam::123456789012:role/eks-admin \
  --policy-arn arn:aws:eks:us-east-1:123456789012:access-policy/AmazonEKSEditPolicy \
  --access-scope type=cluster
```

## Cluster Autoscaler Configuration

### Cluster Autoscaler Deployment (Helm)

```yaml
# values.yaml for Cluster Autoscaler Helm chart
clusterAutoscaler:
  enabled: true
  autoDiscovery:
    clusterName: my-eks-cluster
  awsRegion: us-east-1
  rbac:
    create: true
    serviceAccount:
      create: true
      name: cluster-autoscaler
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/ClusterAutoscalerRole
  image:
    tag: v9.30.0
  extraArgs:
    balance-similar-node-groups: true
    skip-nodes-with-local-storage: false
    expander: priority
    scale-down-unneeded-time: 10m
    scale-down-delay-after-add: 10m
    scale-down-delay-after-delete: 10m
```

### Node Group with Auto-Discovery Tags

```yaml
nodegroup:
  cluster_name: my-eks-cluster
  nodegroup_name: autoscale-ng
  scaling_config:
    min_size: 1
    max_size: 10
    desired_size: 3

  instance_types:
    - t3.medium
    - t3.large

  labels:
    k8s.io/cluster-autoscaler/enabled: "true"
    k8s.io/cluster-autoscaler/my-eks-cluster: "true"

  tags:
    k8s.io/cluster-autoscaler/enabled: "true"
    k8s.io/cluster-autoscaler/my-eks-cluster: "true"
    cluster-autoscaler.kubernetes.io/priority: "10"  # Priority for expander
```

### Cluster Autoscaler IAM Role (IRSA)

```yaml
cluster_autoscaler_role:
  role_name: ClusterAutoscalerRole
  assume_role_policy: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Principal": {
            "Federated": "arn:aws:iam::123456789012:oidc-provider/oidc.eks.us-east-1.amazonaws.com/id/{{cluster_oidc}}"
          },
          "Action": "sts:AssumeRoleWithWebIdentity",
          "Condition": {
            "StringEquals": {
              "oidc.eks.us-east-1.amazonaws.com/id/{{cluster_oidc}}:sub": "system:serviceaccount:kube-system:cluster-autoscaler",
              "oidc.eks.us-east-1.amazonaws.com/id/{{cluster_oidc}}:aud": "sts.amazonaws.com"
            }
          }
        }
      ]
    }
  managed_policies:
    - arn:aws:iam::aws:policy/AutoScalingFullAccess
```

## Pod Security Standards Configuration

### Namespace with PSS

```yaml
# Apply PSS to namespace
apiVersion: v1
kind: Namespace
metadata:
  name: secure-namespace
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
```

### Restricted Pod Example

```yaml
apiVersion: v1
kind: Pod
metadata:
  name: restricted-pod
  namespace: secure-namespace
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: secure-container
    image: nginx:latest
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      readOnlyRootFilesystem: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
```

## Network Policies Configuration

### Default Deny All

```yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: default
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: default
spec:
  podSelector: {}
  policyTypes:
  - Egress
```

### Allow Same Namespace

```yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-same-namespace
  namespace: default
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}
  egress:
  - to:
    - podSelector: {}
```

### Allow Specific Services

```yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: backend
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: frontend
    ports:
    - protocol: TCP
      port: 8080
```

## Horizontal Pod Autoscaler (HPA)

### HPA Configuration

```yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web-app-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
```

## Vertical Pod Autoscaler (VPA)

### VPA Configuration

```yaml
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: web-app-vpa
  namespace: production
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-app
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: "*"
      minAllowed:
        cpu: 100m
        memory: 100Mi
      maxAllowed:
        cpu: 2
        memory: 4Gi
      controlledResources: ["cpu", "memory"]
```

## Cost Optimization Configuration

### Spot Instance Node Group with Priority

```yaml
nodegroup:
  cluster_name: my-eks-cluster
  nodegroup_name: spot-priority-high
  scaling_config:
    min_size: 0
    max_size: 20
    desiredSize: 5

  instance_types:
    - m5.large
    - m5a.large
    - m5d.large

  capacity_type: SPOT
  ami_type: AL2_x86_64

  labels:
    capacity-type: spot
    cluster-autoscaler.kubernetes.io/priority: "10"  # High priority

  taints:
    - key: spot
      value: "true"
      effect: NoSchedule

  tags:
    cluster-autoscaler.kubernetes.io/priority: "10"
```

