# EKS Example Configurations

### Cluster Configurations

```yaml
x-subnets: &subnets [subnet-aaa, subnet-bbb, subnet-ccc]
x-sg: &sg [sg-eks-cluster]
x-role: &eks-role arn:aws:iam::123456789012:role/eksClusterRole

# Basic cluster
cluster: &basic-cluster
  name: my-eks-cluster
  version: "1.30"
  role_arn: *eks-role
  vpc_config:
    subnet_ids: *subnets
    security_group_ids: *sg
    endpoint_public_access: true
    endpoint_private_access: true
  logging:
    cluster_logging:
      - types: [api, audit]
        enabled: true

# With encryption
cluster:
  <<: *basic-cluster
  name: secure-eks-cluster
  encryption_config:
    - resources: [secrets]
      provider:
        key_arn: arn:aws:kms:us-east-1:123456789012:key/abc-123-def-456
  logging:
    cluster_logging:
      - types: [api, audit, authenticator, controllerManager, scheduler]
        enabled: true

# Private endpoint only
cluster:
  <<: *basic-cluster
  name: private-eks-cluster
  vpc_config:
    subnet_ids: [subnet-private-aaa, subnet-private-bbb]
    security_group_ids: *sg
    endpoint_private_access: true
    endpoint_public_access: false
  logging:
    cluster_logging:
      - types: [api, audit]
        enabled: true
```

### Managed Node Groups

```yaml
x-ng-common: &ng-common
  cluster_name: my-eks-cluster
  node_role: arn:aws:iam::123456789012:role/eksNodeRole
  subnets: [subnet-aaa, subnet-bbb, subnet-ccc]

# On-demand
nodegroup:
  <<: *ng-common
  nodegroup_name: ondemand-ng
  scaling_config: {min_size: 2, max_size: 10, desired_size: 3}
  instance_types: [t3.medium, t3.large]
  ami_type: AL2_x86_64
  capacity_type: ON_DEMAND
  disk_size: 50

# Spot
nodegroup:
  <<: *ng-common
  nodegroup_name: spot-ng
  scaling_config: {min_size: 0, max_size: 20, desired_size: 5}
  instance_types: [m5.large, m5a.large, m5d.large]
  capacity_type: SPOT
  taints:
    - {key: spot, value: "true", effect: NO_SCHEDULE}

# GPU
nodegroup:
  <<: *ng-common
  nodegroup_name: gpu-ng
  scaling_config: {min_size: 1, max_size: 5, desired_size: 2}
  instance_types: [g4dn.xlarge, g4dn.2xlarge]
  ami_type: AL2_x86_64_GPU
  taints:
    - {key: nvidia.com/gpu, value: "true", effect: NO_SCHEDULE}

# Graviton
nodegroup:
  <<: *ng-common
  nodegroup_name: graviton-ng
  scaling_config: {min_size: 1, max_size: 10, desired_size: 3}
  instance_types: [m6g.medium, m6g.large, c6g.large]
  ami_type: AL2_ARM_64

# Bottlerocket
nodegroup:
  cluster_name: my-eks-cluster
  nodegroup_name: bottlerocket-ng
  scaling_config: {min_size: 2, max_size: 10, desired_size: 3}
  ami_type: BOTTLEROCKET_x86_64
  node_role: arn:aws:iam::123456789012:role/eksNodeRole
  subnets: [subnet-aaa, subnet-bbb]
```

### Fargate Profiles

```yaml
x-fargate-common: &fg-common
  cluster_name: my-eks-cluster
  pod_execution_role_arn: arn:aws:iam::123456789012:role/eksFargateRole
  subnets: [subnet-aaa, subnet-bbb]

fargate_profile:
  <<: *fg-common
  profile_name: default-profile
  selectors:
    - {namespace: default, labels: {app: web-service}}
    - {namespace: backend}

fargate_profile:
  <<: *fg-common
  profile_name: coredns-profile
  selectors:
    - {namespace: kube-system, labels: {k8s-app: coredns}}
```

### Addons

```yaml
# Use resolve_conflicts: OVERWRITE for all
addons:
  - &addon-overwrite
    resolve_conflicts: OVERWRITE
  - <<: *addon-overwrite
    addon_name: vpc-cni
    addon_version: v1.12.6-eksbuild.1
    service_account_role_arn: arn:aws:iam::123456789012:role/eksVPCCniRole
  - <<: *addon-overwrite
    addon_name: coredns
    addon_version: v1.9.3-eksbuild.5
  - <<: *addon-overwrite
    addon_name: kube-proxy
    addon_version: v1.28.4-eksbuild.1
  - <<: *addon-overwrite
    addon_name: aws-ebs-csi-driver
    addon_version: v1.24.0-eksbuild.1
    service_account_role_arn: arn:aws:iam::123456789012:role/eksEbsCsiRole
  - <<: *addon-overwrite
    addon_name: aws-efs-csi-driver
    addon_version: v1.5.8-eksbuild.1
    service_account_role_arn: arn:aws:iam::123456789012:role/eksEfsCsiRole
```

### IAM Roles

```yaml
x-eks-stmt: &eks-stmt
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Principal: {Service: eks.amazonaws.com}
      Action: sts:AssumeRole
x-ec2-stmt: &ec2-stmt
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Principal: {Service: ec2.amazonaws.com}
      Action: sts:AssumeRole
x-fg-stmt: &fg-stmt
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Principal: {Service: eks-fargate-pods.amazonaws.com}
      Action: sts:AssumeRole

cluster_role:
  role_name: eksClusterRole
  assume_role_policy: *eks-stmt
  managed_policies: [arn:aws:iam::aws:policy/AmazonEKSClusterPolicy]

node_role:
  role_name: eksNodeRole
  assume_role_policy: *ec2-stmt
  managed_policies:
    - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
    - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
    - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly

fargate_role:
  role_name: eksFargateRole
  assume_role_policy: *fg-stmt
  managed_policies: [arn:aws:iam::aws:policy/AmazonEKSFargatePodExecutionRolePolicy]

vpc_cni_role:
  role_name: eksVPCCniRole
  assume_role_policy:
    Version: "2012-10-17"
    Statement:
      - Effect: Allow
        Principal:
          Federated: "arn:aws:iam::123456789012:oidc-provider/oidc.eks.us-east-1.amazonaws.com/id/{{cluster_oidc}}"
        Action: sts:AssumeRoleWithWebIdentity
        Condition:
          StringEquals:
            "oidc.eks.us-east-1.amazonaws.com/id/{{cluster_oidc}}:sub": "system:serviceaccount:kube-system:aws-node"
  managed_policies: [arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy]
```

### EKS Access Entries

```bash
# Admin
aws eks create-access-entry --cluster-name my-eks-cluster \
  --principal-arn arn:aws:iam::123456789012:user/admin
aws eks associate-access-policy --cluster-name my-eks-cluster \
  --principal-arn arn:aws:iam::123456789012:user/admin \
  --policy-arn arn:aws:eks::123456789012:access-policy/AmazonEKSClusterAdminPolicy \
  --access-scope type=cluster

# Developer (namespace-scoped)
aws eks associate-access-policy --cluster-name my-eks-cluster \
  --principal-arn arn:aws:iam::123456789012:role/developer \
  --policy-arn arn:aws:eks::123456789012:access-policy/AmazonEKSEditPolicy \
  --access-scope type=namespace,namespaces=dev
```