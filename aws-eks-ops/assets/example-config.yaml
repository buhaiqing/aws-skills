## EKS Addons

```yaml
addons:
  - addon_name: vpc-cni
    addon_version: v1.12.6-eksbuild.1
    service_account_role_arn: arn:aws:iam::123456789012:role/eksVPCCniRole
    resolve_conflicts: OVERWRITE
    configuration_values: |
      {
        "env": {
          "AWS_VPC_K8S_CNI_CUSTOM_NETWORK_CFG": "true",
          "ENI_CONFIG_LABEL_DEF": "topology.kubernetes.io/zone"
        }
      }

  - addon_name: coredns
    addon_version: v1.9.3-eksbuild.5
    resolve_conflicts: OVERWRITE

  - addon_name: kube-proxy
    addon_version: v1.28.4-eksbuild.1
    resolve_conflicts: OVERWRITE

  - addon_name: aws-ebs-csi-driver
    addon_version: v1.24.0-eksbuild.1
    service_account_role_arn: arn:aws:iam::123456789012:role/eksEbsCsiRole
    resolve_conflicts: OVERWRITE

  - addon_name: aws-efs-csi-driver
    addon_version: v1.5.8-eksbuild.1
    service_account_role_arn: arn:aws:iam::123456789012:role/eksEfsCsiRole
    resolve_conflicts: OVERWRITE
```

## Cluster with Encryption

```yaml
cluster:
  name: secure-eks-cluster
  version: "1.30"
  role_arn: arn:aws:iam::123456789012:role/eksClusterRole

  vpc_config:
    subnet_ids:
      - subnet-aaa
      - subnet-bbb
    security_group_ids:
      - sg-eks-cluster

  encryption_config:
    - resources:
        - secrets
      provider:
        key_arn: arn:aws:kms:us-east-1:123456789012:key/abc-123-def-456

  logging:
    cluster_logging:
      - types:
          - api
          - audit
          - authenticator
          - controllerManager
          - scheduler
        enabled: true
```

## Cluster with Private Endpoint Only

```yaml
cluster:
  name: private-eks-cluster
  version: "1.30"
  role_arn: arn:aws:iam::123456789012:role/eksClusterRole

  vpc_config:
    subnet_ids:
      - subnet-private-aaa
      - subnet-private-bbb
    security_group_ids:
      - sg-eks-cluster
    endpoint_public_access: false
    endpoint_private_access: true

  logging:
    cluster_logging:
      - types:
          - api
          - audit
        enabled: true
```

## IAM Role Definitions

### Cluster IAM Role

```yaml
cluster_role:
  role_name: eksClusterRole
  assume_role_policy: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Principal": {
            "Service": "eks.amazonaws.com"
          },
          "Action": "sts:AssumeRole"
        }
      ]
    }
  managed_policies:
    - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
    - arn:aws:iam::aws:policy/AmazonEKSServicePolicy
  inline_policies:
    - name: CloudWatchLogs
      policy: |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": [
                "logs:CreateLogGroup",
                "logs:DescribeLogGroups",
                "logs:PutRetentionPolicy"
              ],
              "Resource": "*"
            }
          ]
        }
```

### Node IAM Role

```yaml
node_role:
  role_name: eksNodeRole
  assume_role_policy: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Principal": {
            "Service": "ec2.amazonaws.com"
          },
          "Action": "sts:AssumeRole"
        }
      ]
    }
  managed_policies:
    - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
    - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
    - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
    - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
```

### Fargate Pod Execution Role

```yaml
fargate_role:
  role_name: eksFargateRole
  assume_role_policy: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Principal": {
            "Service": "eks-fargate-pods.amazonaws.com"
          },
          "Action": "sts:AssumeRole"
        }
      ]
    }
  managed_policies:
    - arn:aws:iam::aws:policy/AmazonEKSFargatePodExecutionRolePolicy
  inline_policies:
    - name: ECRAccess
      policy: |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": [
                "ecr:GetAuthorizationToken",
                "ecr:BatchCheckLayerAvailability",
                "ecr:GetDownloadUrlForLayer",
                "ecr:BatchGetImage"
              ],
              "Resource": "*"
            }
          ]
        }
```

### VPC CNI Addon Role (IRSA)

```yaml
vpc_cni_role:
  role_name: eksVPCCniRole
  assume_role_policy: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Principal": {
            "Federated": "arn:aws:iam::123456789012:oidc-provider/oidc.eks.us-east-1.amazonaws.com/id/{{cluster_oidc}}"
          },
          "Action": "sts:AssumeRoleWithWebIdentity",
          "Condition": {
            "StringEquals": {
              "oidc.eks.us-east-1.amazonaws.com/id/{{cluster_oidc}}:sub": "system:serviceaccount:kube-system:aws-node",
              "oidc.eks.us-east-1.amazonaws.com/id/{{cluster_oidc}}:aud": "sts.amazonaws.com"
            }
          }
        }
      ]
    }
  managed_policies:
    - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
```

### EBS CSI Driver Addon Role (IRSA)

```yaml
ebs_csi_role:
  role_name: eksEbsCsiRole
  assume_role_policy: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Principal": {
            "Federated": "arn:aws:iam::123456789012:oidc-provider/oidc.eks.us-east-1.amazonaws.com/id/{{cluster_oidc}}"
          },
          "Action": "sts:AssumeRoleWithWebIdentity",
          "Condition": {
            "StringEquals": {
              "oidc.eks.us-east-1.amazonaws.com/id/{{cluster_oidc}}:sub": "system:serviceaccount:kube-system:ebs-csi-controller-sa"
            }
          }
        }
      ]
    }
  managed_policies:
    - arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy
```

## Kubernetes Deployment Example

```yaml
# Example Kubernetes Deployment (for reference)
deployment:
  name: web-app
  replicas: 3
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web-container
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/web-app:v1.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: AWS_REGION
              value: "us-east-1"

service:
  name: web-service
  type: LoadBalancer
  selector:
    app: web-app
  ports:
    - port: 80
      targetPort: 8080
```

## Update kubeconfig Command

```bash
# After cluster creation, update local kubeconfig
aws eks update-kubeconfig \
  --name my-eks-cluster \
  --region us-east-1 \
  --role-arn arn:aws:iam::123456789012:role/eksAdminRole

# Verify
kubectl cluster-info
kubectl get nodes
kubectl get pods -A
```