## Custom Launch Template Node Group

```yaml
launch_template:
  name: eks-custom-node
  version: "1"
  instance_type: t3.medium
  iam_instance_profile:
    name: eksNodeProfile
  block_device_mappings:
    - device_name: /dev/xvda
      ebs:
        volume_size: 100
        volume_type: gp3
        encrypted: true
  user_data: |
    #!/bin/bash
    /etc/eks/bootstrap.sh my-eks-cluster

nodegroup:
  cluster_name: my-eks-cluster
  nodegroup_name: custom-ng
  launch_template:
    id: "{{launch_template_id}}"
    version: "1"
  node_role: arn:aws:iam::123456789012:role/eksNodeRole
  subnets:
    - subnet-aaa
    - subnet-bbb
```

