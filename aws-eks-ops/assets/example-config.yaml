# EKS Example Configurations

## Basic EKS Cluster

```yaml
cluster:
  name: my-eks-cluster
  version: "1.30"
  role_arn: arn:aws:iam::123456789012:role/eksClusterRole

  vpc_config:
    subnet_ids:
      - subnet-aaa  # us-east-1a
      - subnet-bbb  # us-east-1b
      - subnet-ccc  # us-east-1c
    security_group_ids:
      - sg-eks-cluster
    endpoint_public_access: true
    endpoint_private_access: true
    public_access_cidrs:
      - "10.0.0.0/8"  # Restrict to known IPs

  kubernetes_network_config:
    service_ipv4_cidr: "10.100.0.0/16"
    ip_family: ipv4

  logging:
    cluster_logging:
      - types:
          - api
          - audit
          - authenticator
        enabled: true

  tags:
    Environment: production
    Team: platform
```

## Managed Node Group

```yaml
nodegroup:
  cluster_name: my-eks-cluster
  nodegroup_name: production-ng
  scaling_config:
    min_size: 2
    max_size: 10
    desired_size: 3

  instance_types:
    - t3.medium
    - t3.large

  ami_type: AL2_x86_64
  capacity_type: ON_DEMAND
  disk_size: 50

  node_role: arn:aws:iam::123456789012:role/eksNodeRole

  subnets:
    - subnet-aaa
    - subnet-bbb
    - subnet-ccc

  labels:
    env: production
    node-type: general

  tags:
    Environment: production
    NodeGroup: production-ng
```

## Node Group with Spot Instances

```yaml
nodegroup:
  cluster_name: my-eks-cluster
  nodegroup_name: spot-ng
  scaling_config:
    min_size: 0
    max_size: 20
    desired_size: 5

  instance_types:
    - m5.large
    - m5a.large
    - m5d.large
    - m5n.large
    - m5dn.large

  capacity_type: SPOT
  ami_type: AL2_x86_64

  node_role: arn:aws:iam::123456789012:role/eksNodeRole

  subnets:
    - subnet-aaa
    - subnet-bbb
    - subnet-ccc

  labels:
    env: production
    capacity-type: spot

  taints:
    - key: spot
      value: true
      effect: NO_SCHEDULE
```

## GPU Node Group

```yaml
nodegroup:
  cluster_name: my-eks-cluster
  nodegroup_name: gpu-ng
  scaling_config:
    min_size: 1
    max_size: 5
    desired_size: 2

  instance_types:
    - g4dn.xlarge
    - g4dn.2xlarge

  ami_type: AL2_x86_64_GPU

  node_role: arn:aws:iam::123456789012:role/eksNodeRole

  subnets:
    - subnet-aaa
    - subnet-bbb

  labels:
    gpu: nvidia
    node-type: gpu

  taints:
    - key: nvidia.com/gpu
      value: present
      effect: NO_SCHEDULE
```

