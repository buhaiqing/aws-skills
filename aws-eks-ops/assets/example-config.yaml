## Complete Production Example

### Production-Ready EKS Configuration

```yaml
# Full production cluster configuration
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: production-cluster
  region: us-east-1
  version: "1.30"

vpc:
  cidr: "10.0.0.0/16"
  clusterEndpoints:
    publicAccess: true
    privateAccess: true

managedNodeGroups:
  # On-demand for critical workloads
  - name: critical-ng
    instanceType: t3.large
    minSize: 3
    maxSize: 10
    desiredSize: 3
    capacityType: ON_DEMAND
    labels:
      node-type: critical
      cluster-autoscaler.kubernetes.io/priority: "1"
    tags:
      Environment: production
      NodeGroup: critical

  # Spot for batch workloads
  - name: batch-ng
    instanceTypes:
      - m5.large
      - m5a.large
    minSize: 0
    maxSize: 20
    desiredSize: 5
    capacityType: SPOT
    labels:
      node-type: batch
      capacity-type: spot
      cluster-autoscaler.kubernetes.io/priority: "10"
    taints:
      - key: spot
        value: "true"
        effect: NoSchedule
    tags:
      Environment: production
      NodeGroup: batch

  # Graviton for cost-optimized workloads
  - name: graviton-ng
    instanceTypes:
      - m6g.medium
      - m6g.large
    minSize: 2
    maxSize: 10
    desiredSize: 3
    amiType: AL2_ARM_64
    labels:
      node-type: graviton
      arch: arm64
      cluster-autoscaler.kubernetes.io/priority: "5"
    tags:
      Environment: production
      NodeGroup: graviton

addons:
  - name: vpc-cni
    version: latest
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
  - name: aws-ebs-csi-driver
    version: latest
  - name: aws-efs-csi-driver
    version: latest

# Enable CloudWatch logging
cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
      - controllerManager
      - scheduler
```