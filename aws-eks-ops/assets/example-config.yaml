        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    serviceMonitorSelectorNilUsesHelmValues: false

grafana:
  adminPassword: admin
  persistence:
    enabled: true
    size: 10Gi
  service:
    type: LoadBalancer
```

