## Kubernetes Deployment Example

```yaml
# Example Kubernetes Deployment (for reference)
deployment:
  name: web-app
  replicas: 3
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
    spec:
      containers:
        - name: web-container
          image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/web-app:v1.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: AWS_REGION
              value: "us-east-1"

service:
  name: web-service
  type: LoadBalancer
  selector:
    app: web-app
  ports:
    - port: 80
      targetPort: 8080
```

