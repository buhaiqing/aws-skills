# Lambda Configuration Examples

### Function Examples

```yaml
x-code: &code {s3_bucket: deployment-artifacts}
x-tags: &tags {Project: data-platform, Environment: production}
x-exec-role: &exec-role arn:aws:iam::123456789012:role/lambda-execution-role

# Python — basic
function:
  name: data-processor
  runtime: python3.11
  handler: lambda_function.process_data
  timeout: 60
  memory_size: 512
  code: {<<: *code, s3_key: functions/data-processor/v1.0.zip}
  environment_variables:
    LOG_LEVEL: INFO
    BATCH_SIZE: 100
    MAX_RETRIES: 3
  execution_role: *exec-role
  tags: {<<: *tags, Owner: data-team}

# Python — with VPC
function:
  name: database-sync
  runtime: python3.11
  handler: app.sync_database
  timeout: 120
  memory_size: 1024
  code: {<<: *code, s3_key: functions/database-sync/v2.1.zip}
  execution_role: arn:aws:iam::123456789012:role/lambda-vpc-role
  vpc_config:
    subnet_ids: [subnet-0a1b2c3d4e5f6g7h, subnet-1a2b3c4d5e6f7g8h]
    security_group_ids: [sg-0123456789abcdef0]
  environment_variables:
    DB_HOST: "{{secrets.RDS_HOST}}"
    DB_PORT: 5432
    DB_NAME: production-db
  tags: {<<: *tags, Network: private}

# Node.js — API handler
function:
  name: api-handler
  runtime: nodejs20.x
  handler: index.handler
  timeout: 30
  memory_size: 256
  code: {<<: *code, s3_key: functions/api-handler/v3.0.zip}
  execution_role: arn:aws:iam::123456789012:role/lambda-api-role
  environment_variables:
    API_VERSION: v3
    CORS_ORIGIN: https://app.example.com
  tags: {<<: *tags, Type: backend}

# Python — with layers
function:
  name: analytics-processor
  runtime: python3.11
  handler: analytics.process
  timeout: 90
  memory_size: 1024
  code: {<<: *code, s3_key: functions/analytics-processor/v1.2.zip}
  execution_role: arn:aws:iam::123456789012:role/lambda-analytics-role
  layers:
    - arn:aws:lambda:us-east-1:123456789012:layer:data-utils:5
    - arn:aws:lambda:us-east-1:123456789012:layer:logging-framework:3
  environment_variables:
    DATA_FORMAT: parquet
    OUTPUT_BUCKET: analytics-results
  tags: {<<: *tags, Project: analytics}
```

### Layers

```yaml
x-layer-base: &layer-base
  content:
    s3_bucket: layer-artifacts
    s3_key: layers/python-utils/v5.0.zip
  compatible_architectures: [x86_64, arm64]

layer:
  <<: *layer-base
  name: python-utils
  description: "Common Python utilities"
  compatible_runtimes: [python3.9, python3.10, python3.11, python3.12]
```

### Event Source Mappings

```yaml
# SQS
event_source_mapping:
  function_name: sqs-processor
  event_source_arn: arn:aws:sqs:us-east-1:123456789012:message-queue
  batch_size: 10
  enabled: true
  # IAM: sqs:ReceiveMessage, sqs:DeleteMessage, sqs:GetQueueAttributes

# DynamoDB Stream
event_source_mapping:
  function_name: stream-processor
  event_source_arn: arn:aws:dynamodb:us-east-1:123456789012:table/orders/stream/2024-01-01T00:00:00
  batch_size: 100
  starting_position: LATEST
  parallelization_factor: 2
  enabled: true

# Kinesis Stream
event_source_mapping:
  function_name: kinesis-consumer
  event_source_arn: arn:aws:kinesis:us-east-1:123456789012:stream/events-stream
  batch_size: 100
  starting_position: TRIM_HORIZON
  parallelization_factor: 5
  enabled: true
```

### Concurrency

```yaml
# Reserved concurrency — guarantees 100 concurrent executions
concurrency:
  function_name: critical-function
  reserved_concurrent_executions: 100

# Provisioned concurrency — eliminates cold start for latency-sensitive
provisioned_concurrency:
  function_name: latency-sensitive-function
  qualifier: "prod"
  provisioned_concurrent_executions: 50
```

### Alias

```yaml
# Simple alias
alias: &prod-alias
  function_name: api-function
  name: prod
  function_version: "10"
  description: "Production alias"

# Weighted alias (canary: 10% to v11)
alias:
  <<: *prod-alias
  routing_config:
    additional_version_weights:
      "11": 0.1
```