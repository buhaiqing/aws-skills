  tags:
    - Key: Type
      Value: asymmetric
    - Key: Algorithm
      Value: ECC-NIST-P256
    - Key: Purpose
      Value: digital-signature
```

## Service Integration Keys

### S3 SSE-KMS Key
```yaml
key:
  description: "KMS key for S3 bucket encryption"
  key_usage: ENCRYPT_DECRYPT
  key_spec: SYMMETRIC_DEFAULT
  
  policy:
    version: "2012-10-17"
    statement:
      - sid: "Enable IAM User Permissions"
        effect: Allow
        principal:
          AWS: "arn:aws:iam::{{user.AccountId}}:root"
        action: "kms:*"
        resource: "*"
      
      - sid: "Allow S3 Service"
        effect: Allow
        principal:
          Service: "s3.amazonaws.com"
        action:
          - "kms:GenerateDataKey*"
          - "kms:Decrypt"
        resource: "*"
        condition:
          StringEquals:
            "kms:CallerAccount": "{{user.AccountId}}"
            "kms:ViaService": "s3.{{user.Region}}.amazonaws.com"
      
      - sid: "Allow S3 User Access"
        effect: Allow
        principal:
          AWS: "arn:aws:iam::{{user.AccountId}}:role/S3AccessRole"
        action:
          - "kms:Encrypt"
          - "kms:Decrypt"
          - "kms:GenerateDataKey*"
          - "kms:DescribeKey"
        resource: "*"
  
  rotation:
    enabled: true
  
  alias: "alias/s3-encryption-key"
  
  tags:
    - Key: Service
      Value: S3
    - Key: Encryption
      Value: SSE-KMS
```

