# KMS Example Configurations

Configuration examples for AWS KMS operations.

## Basic Key Creation

### Symmetric Encryption Key
```yaml
key:
  description: "Application data encryption key"
  key_usage: ENCRYPT_DECRYPT
  key_spec: SYMMETRIC_DEFAULT
  origin: AWS_KMS
  
  # Key policy - allow root + specific role
  policy:
    version: "2012-10-17"
    statement:
      - sid: "Enable IAM User Permissions"
        effect: Allow
        principal:
          AWS: "arn:aws:iam::{{user.AccountId}}:root"
        action: "kms:*"
        resource: "*"
      
      - sid: "Allow Application Role"
        effect: Allow
        principal:
          AWS: "arn:aws:iam::{{user.AccountId}}:role/ApplicationRole"
        action:
          - "kms:Encrypt"
          - "kms:Decrypt"
          - "kms:GenerateDataKey*"
          - "kms:DescribeKey"
        resource: "*"
  
  # Auto-rotation enabled
  rotation:
    enabled: true
  
  # Alias for reference
  alias: "alias/app-data-key"
  
  # Tags
  tags:
    - Key: Environment
      Value: production
    - Key: Application
      Value: myapp
    - Key: Purpose
      Value: data-encryption
```

### Asymmetric RSA Key for Encryption
```yaml
key:
  description: "RSA key for asymmetric encryption"
  key_usage: ENCRYPT_DECRYPT
  key_spec: RSA_2048
  origin: AWS_KMS
  
  policy:
    version: "2012-10-17"
    statement:
      - sid: "Enable IAM User Permissions"
        effect: Allow
        principal:
          AWS: "arn:aws:iam::{{user.AccountId}}:root"
        action: "kms:*"
        resource: "*"
      
      - sid: "Allow Encryption Operations"
        effect: Allow
        principal:
          AWS: "arn:aws:iam::{{user.AccountId}}:role/EncryptionService"
        action:
          - "kms:Encrypt"
          - "kms:Decrypt"
          - "kms:DescribeKey"
        resource: "*"
  
  # No auto-rotation for asymmetric keys
  rotation:
    enabled: false
  
  alias: "alias/rsa-encryption-key"
  
  tags:
    - Key: Type
      Value: asymmetric
    - Key: Algorithm
      Value: RSA-2048
```

### ECC Key for Signing
```yaml
key:
  description: "ECC key for digital signatures"
  key_usage: SIGN_VERIFY
  key_spec: ECC_NIST_P256
  origin: AWS_KMS
  
  policy:
    version: "2012-10-17"
    statement:
      - sid: "Enable IAM User Permissions"
        effect: Allow
        principal:
          AWS: "arn:aws:iam::{{user.AccountId}}:root"
        action: "kms:*"
        resource: "*"
      
      - sid: "Allow Signing"
        effect: Allow
