# KMS Example Configurations

### Basic Key Types

```yaml
x-iam-root: &iam-root
  Version: "2012-10-17"
  Statement:
    - Sid: "Enable IAM User Permissions"
      Effect: Allow
      Principal:
        AWS: "arn:aws:iam::{{user.AccountId}}:root"
      Action: "kms:*"
      Resource: "*"

# Symmetric encryption (default for most workloads)
key:
  description: "Application data encryption key"
  key_usage: ENCRYPT_DECRYPT
  key_spec: SYMMETRIC_DEFAULT
  origin: AWS_KMS
  policy: *iam-root
  rotation: {enabled: true}
  alias: "alias/app-data-key"
  tags:
    - {Key: Environment, Value: production}
    - {Key: Application, Value: myapp}

# Asymmetric RSA (encryption use)
key:
  description: "RSA key for asymmetric encryption"
  key_usage: ENCRYPT_DECRYPT
  key_spec: RSA_2048
  origin: AWS_KMS
  policy: *iam-root
  rotation: {enabled: false}
  alias: "alias/rsa-encryption-key"
  tags:
    - {Key: Type, Value: asymmetric}
    - {Key: Algorithm, Value: RSA-2048}

# ECC signing key
key:
  description: "ECC key for digital signatures"
  key_usage: SIGN_VERIFY
  key_spec: ECC_NIST_P256
  origin: AWS_KMS
  policy: *iam-root
  rotation: {enabled: false}
  alias: "alias/signing-key"
  tags:
    - {Key: Type, Value: asymmetric}
    - {Key: Algorithm, Value: ECC-NIST-P256}
```

### Service Integration Keys

```yaml
# S3 SSE-KMS with service condition
key:
  description: "S3 bucket encryption"
  key_spec: SYMMETRIC_DEFAULT
  key_usage: ENCRYPT_DECRYPT
  policy:
    Version: "2012-10-17"
    Statement:
      - Sid: "Enable IAM User Permissions"
        Effect: Allow
        Principal:
          AWS: "arn:aws:iam::{{user.AccountId}}:root"
        Action: "kms:*"
        Resource: "*"
      - Sid: "Allow S3 Service"
        Effect: Allow
        Principal: {Service: s3.amazonaws.com}
        Action: [kms:GenerateDataKey*, kms:Decrypt]
        Resource: "*"
        Condition:
          StringEquals:
            "kms:CallerAccount": "{{user.AccountId}}"
            "kms:ViaService": "s3.{{user.Region}}.amazonaws.com"
      - Sid: "Allow S3 User Access"
        Effect: Allow
        Principal:
          AWS: "arn:aws:iam::{{user.AccountId}}:role/S3AccessRole"
        Action: [kms:Encrypt, kms:Decrypt, kms:GenerateDataKey*, kms:DescribeKey]
        Resource: "*"
  rotation: {enabled: true}
  alias: "alias/s3-encryption-key"
  tags:
    - {Key: Service, Value: S3}
    - {Key: Encryption, Value: SSE-KMS}

# RDS encryption
key:
  description: "RDS database encryption"
  key_spec: SYMMETRIC_DEFAULT
  key_usage: ENCRYPT_DECRYPT
  policy:
    Version: "2012-10-17"
    Statement:
      - Sid: "Enable IAM User Permissions"
        Effect: Allow
        Principal:
          AWS: "arn:aws:iam::{{user.AccountId}}:root"
        Action: "kms:*"
        Resource: "*"
      - Sid: "Allow RDS Service"
        Effect: Allow
        Principal: {Service: rds.amazonaws.com}
        Action: [kms:Encrypt, kms:Decrypt, kms:GenerateDataKey*, kms:DescribeKey]
        Resource: "*"
        Condition:
          StringEquals:
            "kms:CallerAccount": "{{user.AccountId}}"
      - Sid: "Allow RDS Admin"
        Effect: Allow
        Principal:
          AWS: "arn:aws:iam::{{user.AccountId}}:role/RDSAdmin"
        Action:
          - kms:Encrypt
          - kms:Decrypt
          - kms:GenerateDataKey*
          - kms:DescribeKey
          - kms:ReEncrypt*
          - kms:CreateGrant
        Resource: "*"
  rotation: {enabled: true}
  alias: "alias/rds-encryption-key"
  tags:
    - {Key: Service, Value: RDS}
    - {Key: Encryption, Value: storage}
```

### Special Key Types

```yaml
# BYOK (imported key material)
key:
  description: "Key with imported material"
  key_usage: ENCRYPT_DECRYPT
  key_spec: SYMMETRIC_DEFAULT
  origin: EXTERNAL
  import:
    wrapping_algorithm: RSAES_OAEP_SHA_256
    wrapping_key_spec: RSA_2048
  rotation: {enabled: false}
  alias: "alias/imported-key"
  tags:
    - {Key: Origin, Value: external}
    - {Key: Compliance, Value: BYOK}

# Multi-region key
key:
  description: "Multi-region key primary"
  key_spec: SYMMETRIC_DEFAULT
  key_usage: ENCRYPT_DECRYPT
  multi_region: true
  origin: AWS_KMS
  policy:
    Version: "2012-10-17"
    Statement:
      - Sid: "Enable IAM User Permissions"
        Effect: Allow
        Principal:
          AWS: "arn:aws:iam::{{user.AccountId}}:root"
        Action: "kms:*"
        Resource: "*"
      - Sid: "Allow Application Access"
        Effect: Allow
        Principal:
          AWS: "arn:aws:iam::{{user.AccountId}}:role/ApplicationRole"
        Action: [kms:Encrypt, kms:Decrypt, kms:GenerateDataKey*, kms:DescribeKey]
        Resource: "*"
  rotation: {enabled: true}
  alias: "alias/multi-region-key"
  replicas:
    - {region: us-west-2, policy: "{{user.ReplicaPolicy}}"}
    - {region: eu-west-1, policy: "{{user.ReplicaPolicy}}"}
```

### Grants

```yaml
grant:
  key_id: "{{user.KeyId}}"
  grantee_principal: "arn:aws:iam::{{user.AccountId}}:role/EC2-Role"
  operations: [Encrypt, Decrypt, GenerateDataKey, DescribeKey]
  constraints:
    encryption_context_subset:
      service: "ec2"
      environment: "production"
  name: "ec2-grant"
```