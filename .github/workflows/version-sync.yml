name: Version Sync Check

on:
  push:
    branches: [main]
    paths:
      - 'aws-*/SKILL.md'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check and fix version sync
        id: check
        run: |
          fixes=0
          for d in aws-*-ops; do
            [ -d "$d" ] || continue
            v=$(grep -m1 'version:' "$d/SKILL.md" 2>/dev/null | awk '{print $2}' | tr -d '"')
            [ -z "$v" ] && continue

            # EN README: replace version in line containing skill name
            if grep -q "| $d |" README.md && ! grep -q "| $d |.*v$v" README.md; then
              echo "FIX: $d → v$v in README.md"
              sed -i "s/| $d |.*|.*v[0-9][0-9.]*|/| $d |...| v$v|/" README.md
              # Actually replace properly: keep the status text, just swap version
              sed -i "/| $d |/s/v[0-9][0-9.]*/v$v/" README.md
              fixes=$((fixes + 1))
            fi

            # CN README: same logic
            if grep -q "| $d |" README_cn.md && ! grep -q "| $d |.*v$v" README_cn.md; then
              echo "FIX: $d → v$v in README_cn.md"
              sed -i "/| $d |/s/v[0-9][0-9.]*/v$v/" README_cn.md
              fixes=$((fixes + 1))
            fi
          done

          echo "fixes=$fixes" >> "$GITHUB_OUTPUT"
          [ "$fixes" -eq 0 ] && echo "All versions in sync."

      - name: Create PR if fixes needed
        if: steps.check.outputs.fixes != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: sync README versions with SKILL.md"
          title: "chore: auto-sync README version numbers (${{ steps.check.outputs.fixes }} fixes)"
          body: |
            Auto-generated by version-sync workflow.

            Detected and fixed ${{ steps.check.outputs.fixes }} version mismatch(es) between SKILL.md frontmatter and README Existing Skills tables.
          branch: auto/version-sync
          delete-branch: true
          labels: automated
