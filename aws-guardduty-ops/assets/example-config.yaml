# AWS GuardDuty Example Configuration
# Replace {{env.*}} and {{user.*}} placeholders before use

# Common environment variables
x-env: &env
  AWS_DEFAULT_REGION: {{env.AWS_DEFAULT_REGION}}
  AWS_ACCESS_KEY_ID: {{env.AWS_ACCESS_KEY_ID}}
  AWS_SECRET_ACCESS_KEY: {{env.AWS_SECRET_ACCESS_KEY}}

# Dev environment config
x-dev: &dev
  <<: *env
  user:
    region: us-east-1
    detector_id: "12abc34def567890ghijklmnopqrstuvw"
    resource_name: "my-guardduty-filter"

# Prod environment config
x-prod: &prod
  <<: *env
  user:
    region: us-east-1
    detector_id: "98zyx76wvuts54321tsrqponmlkjihgfedcba"
    resource_name: "prod-guardduty-filter"

# Example: Create Filter
create-filter:
  <<: *dev
  filter:
    name: {{user.resource_name}}
    description: "Archive low-severity findings"
    action: ARCHIVE
    rank: 1

# Example: Delete Filter
delete-filter:
  <<: *dev
  filter:
    name: {{user.resource_name}}

# Example: List Findings
list-findings:
  <<: *dev
  finding:
    max_results: 50

# Example: Create IP Set
create-ip-set:
  <<: *dev
  ip_set:
    name: "trusted-ip-list"
    location: "s3://my-bucket/ip-list.txt"
    activate: true