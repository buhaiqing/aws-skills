# Topology Baseline - GitHub Actions
# Schedule: daily 2 AM UTC + manual trigger
name: Topology Baseline
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}
      - name: Run baseline
        run: python aws-topo-discovery/scripts/baseline-manager.py --output-dir ./infra-baseline
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
      - name: Commit and push baseline
        run: |
          git config user.name "topo-discovery"
          git config user.email "topo@aws-skills.local"
          git add infra-baseline/
          git diff --staged --quiet || git commit -m "baseline: $(date +%Y-%m-%d)"
          git push
