# CloudTrail Configuration Examples (YAML Anchors)
# ===============================================
# Template: Replace {{user.*}} placeholders at runtime.
# Use YAML anchors to avoid repeating common settings.

# --- Shared Anchors ---
x-trail-basic: &trail-basic
  Name: "{{user.TrailName}}"
  S3BucketName: "{{user.S3BucketName}}"
  IsMultiRegionTrail: "{{user.IsMultiRegionTrail:false}}"
  EnableLogFileValidation: true
  Tags:
    - Key: "ManagedBy"; Value: "AI-Agent"

x-event-sel-all: &event-sel-all
  ReadWriteType: "All"
  IncludeManagementEvents: true
  DataResources: []

x-event-sel-mgmt: &event-sel-mgmt
  ReadWriteType: "All"
  IncludeManagementEvents: true

x-insights-api-rate: &insights-api-rate
  InsightType: "ApiCallRateInsight"

x-insights-api-error: &insights-api-error
  InsightType: "ApiErrorRateInsight"

# --- Example: Basic Regional Trail ---
basic-regional: &basic-regional
  <<: *trail-basic
  IsMultiRegionTrail: false
  S3KeyPrefix: "{{user.S3KeyPrefix:audit/}}"
  EventSelectors:
    - *event-sel-all

# --- Example: Multi-Region Security Trail ---
multi-region-security: &multi-region-security
  <<: *trail-basic
  IsMultiRegionTrail: true
  IncludeGlobalServiceEvents: true
  S3KeyPrefix: "{{user.S3KeyPrefix:security/}}"
  KmsKeyId: "{{user.KmsKeyId}}"
  EventSelectors:
    - *event-sel-all
  InsightSelectors:
    - *insights-api-rate
    - *insights-api-error

# --- Example: Trail with CloudWatch Logs ---
trail-with-cw: &trail-with-cw
  <<: *trail-basic
  IsMultiRegionTrail: true
  S3KeyPrefix: "{{user.S3KeyPrefix:cloudtrail/}}"
  CloudWatchLogsLogGroup: "/aws/cloudtrail/{{user.TrailName}}"
  CloudWatchLogsRoleArn: "{{user.CloudWatchLogsRoleArn}}"
  EventSelectors:
    - *event-sel-mgmt
