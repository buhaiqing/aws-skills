# EC2 Instance Configuration Examples (YAML Anchors)
# ====================================================
# Template: Replace {{user.*}} placeholders at runtime.
# Use YAML anchors to avoid repeating common settings.

# --- Shared Anchors ---
x-tags-dev: &tags-dev
  Tags:
    - Key: "Name"; Value: "{{user.instance_name}}"
    - Key: "Environment"; Value: "dev"
    - Key: "ManagedBy"; Value: "AI-Agent"

x-sg-basic: &sg-basic
  Inbound:
    - {IpProtocol: tcp, FromPort: 22,  ToPort: 22,  CidrIp: "0.0.0.0/0", Description: "SSH"}
    - {IpProtocol: tcp, FromPort: 80,  ToPort: 80,  CidrIp: "0.0.0.0/0", Description: "HTTP"}
    - {IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: "0.0.0.0/0", Description: "HTTPS"}
  Outbound:
    - {IpProtocol: "-1", CidrIp: "0.0.0.0/0", Description: "All outbound"}

x-ebs-gp3: &ebs-gp3
  VolumeType: "gp3"
  DeleteOnTermination: true
  Iops: 3000
  Throughput: 125

x-metadata: &metadata
  HttpTokens: "required"
  HttpPutResponseHopLimit: 1

# --- Instance Launch Configuration ---
instance_config:
  ImageId: "{{user.ami_id}}"
  InstanceType: "{{user.instance_type:t3.micro}}"
  KeyName: "{{user.key_name}}"
  SecurityGroupIds: ["{{user.sg_id}}"]
  SubnetId: "{{user.subnet_id}}"
  <<: *metadata
  BlockDeviceMappings:
    - DeviceName: "/dev/xvda"
      Ebs:
        <<: *ebs-gp3
        VolumeSize: 20
  <<: *tags-dev

# --- User Data Script (Bootstrapping) ---
user_data: |
  #!/bin/bash
  yum update -y
  yum install -y httpd
  systemctl enable httpd
  systemctl start httpd
  echo "<h1>Hello from {{user.instance_name}}</h1>" > /var/www/html/index.html

# --- EBS Volume Configuration ---
volume_config:
  <<: *ebs-gp3
  Size: 50
  AvailabilityZone: "{{user.region}}a"
  Encrypted: true
  Tags: [{Key: "Name", Value: "data-volume-{{user.instance_name}}"}]

# --- Security Group Rules ---
security_group_rules: *sg-basic

# --- KeyPair Config ---
keypair_config:
  KeyName: "{{user.key_name}}"
  KeyType: "ed25519"
  KeyFormat: "pem"

# --- Reserved Instance ---
reserved_instance_offer:
  InstanceType: "t3.micro"
  InstanceCount: 1
  ProductDescription: "Linux/UNIX"
  OfferingClass: "standard"
  OfferingType: "All Upfront"
  DurationSeconds: 31536000

# --- Spot Instance Request ---
spot_request:
  InstanceCount: 1
  Type: "one-time"
  InstanceInterruptionBehavior: "terminate"
  SpotPrice: "0.05"
  LaunchSpecification:
    ImageId: "{{user.ami_id}}"
    InstanceType: "t3.micro"
    KeyName: "{{user.key_name}}"
    SecurityGroupIds: ["{{user.sg_id}}"]

# --- Snapshot Configuration ---
snapshot_config:
  VolumeId: "{{user.volume_id}}"
  Description: "Backup of {{user.volume_id}} - {{env.AWS_DEFAULT_REGION}}"
  TagSpecifications:
    - ResourceType: snapshot
      Tags:
        - {Key: "Backup", Value: "daily"}
        - {Key: "CreatedBy", Value: "AI-Agent"}

# --- Auto Recovery Alarm (CloudWatch) ---
recovery_alarm:
  AlarmName: "EC2-Recovery-{{user.instance_name}}"
  Namespace: "AWS/EC2"
  MetricName: "StatusCheckFailed_System"
  Statistic: "Minimum"
  Period: 60
  EvaluationPeriods: 2
  Threshold: 1.0
  ComparisonOperator: "GreaterThanOrEqualToThreshold"
  AlarmActions: ["arn:aws:automate:{{env.AWS_DEFAULT_REGION}}:ec2:recover"]